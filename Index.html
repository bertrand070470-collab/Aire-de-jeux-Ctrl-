<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Aires de Jeux — Strasbourg EVN</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0f1117;--panel:#1a1d27;--card:#22263a;--accent:#4a9eff;
  --evn:#4caf50;--sport:#ff9800;--pem:#ab47bc;--fpe:#26c6da;--ssj:#ef5350;
  --txt:#e8eaf0;--txt2:#8892b0;--border:#2a3050;--radius:12px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
#app{display:flex;flex-direction:column;height:100%;}

/* HEADER */
#header{padding:10px 14px 6px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;}
#header h1{font-size:15px;font-weight:700;color:var(--accent);letter-spacing:.3px;}
#header .sub{font-size:11px;color:var(--txt2);margin-top:1px;}

/* SEARCH BAR */
#searchbar{padding:8px 12px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;display:flex;gap:8px;align-items:center;}
#searchInput{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--txt);font-size:14px;outline:none;}
#searchInput:focus{border-color:var(--accent);}
#clearBtn{background:var(--border);border:none;border-radius:8px;color:var(--txt2);padding:8px 10px;font-size:13px;cursor:pointer;flex-shrink:0;}

/* FILTRES */
#filters{display:flex;gap:6px;padding:6px 12px;background:var(--panel);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
#filters::-webkit-scrollbar{display:none;}
.ftag{border:none;border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;opacity:.5;transition:.15s;}
.ftag.on{opacity:1;}
.ftag.ALL{background:#4a9eff22;color:var(--accent);border:1px solid var(--accent);}
.ftag.EVN{background:#4caf5022;color:var(--evn);border:1px solid var(--evn);}
.ftag.Sport{background:#ff980022;color:var(--sport);border:1px solid var(--sport);}
.ftag.PEMPEA{background:#ab47bc22;color:var(--pem);border:1px solid var(--pem);}
.ftag.FPE{background:#26c6da22;color:var(--fpe);border:1px solid var(--fpe);}
.ftag.SSJ{background:#ef535022;color:var(--ssj);border:1px solid var(--ssj);}

/* TABS */
#tabs{display:flex;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;}
.tab{flex:1;padding:9px;text-align:center;font-size:12px;font-weight:600;color:var(--txt2);cursor:pointer;border-bottom:2px solid transparent;transition:.15s;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* MAIN */
#main{flex:1;overflow:hidden;position:relative;}
#mapView{width:100%;height:100%;display:none;}
#listView{height:100%;overflow-y:auto;padding:8px;display:none;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}

/* CARTE */
#map{width:100%;height:100%;}
.leaflet-container{background:#1a1f35;}

/* Popup carte */
.lpop{min-width:200px;}
.lpop h3{font-size:13px;font-weight:700;color:#fff;margin-bottom:4px;}
.lpop .adr{font-size:11px;color:#aaa;margin-bottom:6px;}
.lpop .badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;}
.lpop .badge{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;}
.lpop .navbtns{display:flex;gap:6px;}
.lpop .navbtn{flex:1;padding:7px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;text-align:center;display:block;}
.lpop .gm{background:#4a9eff;color:#fff;}
.lpop .waze{background:#00c0f3;color:#fff;}

/* LISTE */
.site-card{background:var(--card);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:.15s;active:transform:scale(.98);}
.site-card:active{transform:scale(.97);}
.card-head{padding:11px 13px 7px;display:flex;align-items:flex-start;gap:10px;}
.card-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.card-info{flex:1;min-width:0;}
.card-nom{font-size:13px;font-weight:700;line-height:1.3;color:var(--txt);}
.card-adr{font-size:11px;color:var(--txt2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-dist{font-size:11px;color:var(--accent);font-weight:600;flex-shrink:0;}
.card-foot{padding:0 13px 10px;display:flex;gap:6px;align-items:center;}
.card-svc{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;}
.card-q{font-size:10px;color:var(--txt2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-actions{display:flex;gap:5px;}
.card-btn{padding:5px 9px;border-radius:7px;border:none;font-size:11px;font-weight:700;cursor:pointer;text-decoration:none;}
.card-btn.map-btn{background:#4a9eff22;color:var(--accent);}
.card-btn.nav-btn{background:#4caf5022;color:var(--evn);}

/* LOCALISATION */
#locBar{padding:5px 12px;background:var(--bg);border-top:1px solid var(--border);font-size:11px;color:var(--txt2);flex-shrink:0;display:flex;align-items:center;gap:6px;}
#locBtn{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;}
#locStatus{flex:1;}
#cptSites{font-weight:600;color:var(--txt);}

/* COULEURS SERVICE */
.c-EVN{background:#4caf5033;color:var(--evn);}
.c-Sport{background:#ff980033;color:var(--sport);}
.c-PEMPEA{background:#ab47bc33;color:var(--pem);}
.c-FPE{background:#26c6da33;color:var(--fpe);}
.c-SSJ{background:#ef535033;color:var(--ssj);}

/* résultat vide */
#noResult{text-align:center;padding:40px 20px;color:var(--txt2);display:none;}
#noResult .ico{font-size:40px;margin-bottom:10px;}
</style>
</head>

  <div id="main">
    <div id="mapView"><div id="map"></div></div>
    <div id="listView">
      <div id="siteList"></div>

  </div>
  <div id="locBar">

</div>

// Couleurs par service
const SVC_COLOR = {
  'EVN':'#4caf50','Sport':'#ff9800','PEM/PEA':'#ab47bc','FPE':'#26c6da','SSJ':'#ef5350'
};
function svcColor(s){return SVC_COLOR[s]||'#4a9eff';}
function svcClass(s){return 'c-'+(s||'EVN').replace('/','');}

// État
let currentFilter = 'ALL';
let userPos = null;
let mapMarkers = [];
let currentTab = 'map';
let map, markerLayer;
let filtered = [...SITES];

// ── CARTE ──────────────────────────────────────────────
function initMap(){
  map = L.map('map',{zoomControl:false,attributionControl:false}).setView([48.5734,7.7521],13);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    maxZoom:19,attribution:'© CartoDB'
  }).addTo(map);
  L.control.zoom({position:'bottomright'}).addTo(map);
  markerLayer = L.layerGroup().addTo(map);
  renderMap();
}

function makeIcon(s){
  const c = svcColor(s);
  return L.divIcon({
    className:'',
    html:`<div style="width:10px;height:10px;border-radius:50%;background:${c};border:2px solid rgba(255,255,255,.5);box-shadow:0 0 4px ${c}88;"></div>`,
    iconSize:[10,10],iconAnchor:[5,5]
  });
}

function renderMap(){
  markerLayer.clearLayers();
  const shown = getFiltered();
  shown.forEach(s=>{
    const m = L.marker([s.la,s.lo],{icon:makeIcon(s.s)}).addTo(markerLayer);
    m.bindPopup(popupHTML(s),{maxWidth:260,className:'dark-popup'});
  });
  // Style popup
  if(!document.getElementById('ppStyle')){
    const st=document.createElement('style');
    st.id='ppStyle';
    st.textContent=`.leaflet-popup-content-wrapper{background:#1a1d27!important;border:1px solid #2a3050;border-radius:12px!important;color:#e8eaf0;}.leaflet-popup-tip{background:#1a1d27!important;}.leaflet-popup-content{margin:12px!important;}`;
    document.head.appendChild(st);
  }
}

function popupHTML(s){
  const c = svcColor(s.s);
  const gurl = `https://www.google.com/maps/dir/?api=1&destination=${s.la},${s.lo}&travelmode=driving`;
  const wurl = `https://waze.com/ul?ll=${s.la},${s.lo}&navigate=yes`;
  return `<div class="lpop">
    <h3>${s.n}</h3>
    <div class="adr">${s.a||''}${s.q?'<br><small>'+s.q+'</small>':''}</div>
    <div class="badges">
      <span class="badge" style="background:${c}33;color:${c}">${s.s}</span>
    </div>
    <div class="navbtns">
      <a class="navbtn gm" href="${gurl}" target="_blank">📍 Google Maps</a>
      <a class="navbtn waze" href="${wurl}" target="_blank">🚗 Waze</a>
    </div>
  </div>`;
}

// ── LISTE ──────────────────────────────────────────────
function renderList(){
  const shown = getFiltered();
  const ctr = document.getElementById('siteList');
  const nr  = document.getElementById('noResult');
  document.getElementById('cptSites').textContent = shown.length;

  if(!shown.length){ctr.innerHTML='';nr.style.display='block';return;}
  nr.style.display='none';

  ctr.innerHTML = shown.map(s=>{
    const c = svcColor(s.s);
    const cls = svcClass(s.s);
    const dist = userPos ? distStr(userPos.lat,userPos.lon,s.la,s.lo) : '';
    const gurl = `https://www.google.com/maps/dir/?api=1&destination=${s.la},${s.lo}&travelmode=driving`;
    return `<div class="site-card" onclick="cardClick(${s.la},${s.lo},'${s.n.replace(/'/g,"\\'")}')">
      <div class="card-head">
        <div class="card-dot" style="background:${c}"></div>
        <div class="card-info">
          <div class="card-nom">${s.n}</div>
          <div class="card-adr">${s.a||''}</div>
        </div>
        ${dist?`<div class="card-dist">${dist}</div>`:''}
      </div>
      <div class="card-foot">
        <span class="card-svc ${cls}">${s.s}</span>
        <span class="card-q">${s.q||''}</span>
        <div class="card-actions">
          <button class="card-btn map-btn" onclick="event.stopPropagation();openMap(${s.la},${s.lo})">🗺</button>
          <a class="card-btn nav-btn" href="${gurl}" target="_blank" onclick="event.stopPropagation()">🚗</a>
        </div>
      </div>
    </div>`;
  }).join('');
}

function cardClick(la,lo,nom){
  showTab('map');
  setTimeout(()=>{
    map.setView([la,lo],17);
    markerLayer.eachLayer(m=>{
      if(Math.abs(m.getLatLng().lat-la)<0.0001 && Math.abs(m.getLatLng().lng-lo)<0.0001){
        m.openPopup();
      }
    });
  },100);
}

function openMap(la,lo){
  showTab('map');
  setTimeout(()=>map.setView([la,lo],17),100);
}

// ── FILTRES & SEARCH ───────────────────────────────────
function getFiltered(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  return SITES.filter(s=>{
    const svcOk = currentFilter==='ALL' || s.s===currentFilter;
    if(!svcOk) return false;
    if(!q) return true;
    return s.n.toLowerCase().includes(q)||
           (s.a&&s.a.toLowerCase().includes(q))||
           (s.q&&s.q.toLowerCase().includes(q));
  });
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.ftag').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  refresh();
}

document.getElementById('searchInput').addEventListener('input',refresh);

function clearSearch(){
  document.getElementById('searchInput').value='';
  refresh();
}

function refresh(){
  if(currentTab==='map') renderMap();
  else renderList();
  document.getElementById('cptSites').textContent = getFiltered().length;
}

// ── TABS ───────────────────────────────────────────────
function showTab(tab){
  currentTab=tab;
  document.getElementById('mapView').style.display = tab==='map'?'block':'none';
  document.getElementById('listView').style.display = tab==='list'?'block':'none';
  document.getElementById('tabMap').classList.toggle('active',tab==='map');
  document.getElementById('tabList').classList.toggle('active',tab==='list');
  if(tab==='map'){
    if(!map) initMap(); else {renderMap();setTimeout(()=>map.invalidateSize(),50);}
  } else {
    renderList();
  }
}

// ── GÉOLOCALISATION ────────────────────────────────────
function geolocate(){
  if(!navigator.geolocation){
    alert('Géolocalisation non supportée par ce navigateur.');
    return;
  }
  const btn = document.getElementById('locBtn');
  const status = document.getElementById('locStatus');
  btn.disabled = true;
  btn.textContent = '⏳ …';
  status.textContent = 'Localisation en cours…';

  navigator.geolocation.getCurrentPosition(
    pos => {
      userPos = {lat: pos.coords.latitude, lon: pos.coords.longitude};
      status.textContent = `📍 Précision : ${Math.round(pos.coords.accuracy)} m`;
      btn.disabled = false;
      btn.textContent = '📍 Me localiser';
      if(map){
        if(window._userMarker) window._userMarker.remove();
        window._userMarker = L.circleMarker([userPos.lat, userPos.lon],{
          radius:10, color:'#fff', weight:2, fillColor:'#4a9eff', fillOpacity:1
        }).addTo(map).bindPopup('📍 Vous êtes ici').openPopup();
        map.setView([userPos.lat, userPos.lon], 15);
      }
      if(currentTab === 'list') renderList();
    },
    err => {
      btn.disabled = false;
      btn.textContent = '📍 Me localiser';
      const msgs = {
        1: '🔒 Permission refusée — autorisez la localisation dans votre navigateur',
        2: '📡 Position indisponible (GPS/réseau)',
        3: '⏱ Délai dépassé — réessayez en extérieur'
      };
      status.textContent = msgs[err.code] || `Erreur géo. (code ${err.code})`;
    },
    {enableHighAccuracy: true, timeout: 15000, maximumAge: 0}
  );
}

function distStr(lat1,lon1,lat2,lon2){
  const R=6371000,p1=lat1*Math.PI/180,p2=lat2*Math.PI/180;
  const dp=(lat2-lat1)*Math.PI/180,dl=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dp/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
  const d=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  return d<1000?Math.round(d)+'m':(d/1000).toFixed(1)+'km';
}

// ── INIT ───────────────────────────────────────────────
showTab('map');
</script>
